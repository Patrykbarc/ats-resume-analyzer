name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Type-check, Test, Test:e2e & Build
    runs-on: ubuntu-latest
    permissions:
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Generate Prisma client
        run: pnpm db:generate:prod
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db

      - name: Build packages
        run: pnpm --filter './packages/**' run build

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm tsc

      - name: Test
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter @monorepo/web exec playwright install --with-deps chromium

      - name: Test:e2e
        run: pnpm test:e2e
        env:
          VITE_NODE_ENV: test
          VITE_API_URL: http://localhost:3001
          VITE_FRONTEND_URL: http://localhost:5173
          VITE_PAYMENT_PUBLIC_KEY: pk_test_placeholder
          VITE_CONTACT_EMAIL: test@example.com
          VITE_SENTRY_DSN: https://fake@sentry.io/0

      - name: Build
        run: pnpm build

      - name: 'notify vercel'
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: 'Vercel - ats-resume-analyzer-web: main-rules'
